services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agent_portal
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-with-a-production-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_PASSWORD: admin
      OPENROUTER_EMERGENCY_DISABLED: "true"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
